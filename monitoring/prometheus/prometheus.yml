global:
  scrape_interval: 15s
  evaluation_interval: 15s


scrape_configs:
  - job_name: "scuffinger-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          instance: "scuffinger-api"

  - job_name: "scuffinger-collector"
    metrics_path: /metrics
    static_configs:
      - targets: ["collector:8081"]
        labels:
          instance: "scuffinger-collector"

