{{- if and .Values.grafana.enabled .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scuffinger.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scuffinger.componentLabels" (list . "grafana") | nindent 4 }}
  annotations:
    {{- include "scuffinger.annotations" . | nindent 4 }}
data:
  {{- (.Files.Glob "files/grafana-dashboards/*.json").AsConfig | nindent 2 }}
{{- end }}

