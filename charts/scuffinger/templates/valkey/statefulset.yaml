{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "scuffinger.fullname" . }}-valkey
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scuffinger.componentLabels" (list . "valkey") | nindent 4 }}
  annotations:
    {{- include "scuffinger.annotations" . | nindent 4 }}
spec:
  serviceName: {{ include "scuffinger.fullname" . }}-valkey
  replicas: 1
  selector:
    matchLabels:
      {{- include "scuffinger.componentSelectorLabels" (list . "valkey") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scuffinger.componentSelectorLabels" (list . "valkey") | nindent 8 }}
        {{- with .Values.valkey.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.valkey.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.valkey.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.valkey.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.valkey.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: valkey
          image: {{ printf "%s:%s" .Values.valkey.image.repository .Values.valkey.image.tag }}
          imagePullPolicy: {{ .Values.valkey.image.pullPolicy }}
          {{- if .Values.valkey.extraArgs }}
          args:
            {{- range .Values.valkey.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: valkey
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- if not .Values.valkey.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.valkey.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.valkey.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.valkey.persistence.accessModes | nindent 10 }}
        {{- if .Values.valkey.persistence.storageClass }}
        storageClassName: {{ .Values.valkey.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.valkey.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
{{- end }}

